<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>VMSDEP PDF Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #525659;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #1a1a2e;
      color: white;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px 14px;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      min-height: 46px;
    }

    #toolbar h1 {
      font-size: 14px;
      font-weight: 700;
      color: #7eb8f7;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .match-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    #matchInfo {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      color: #ffb74d;
      min-width: 90px;
      text-align: center;
    }

    .nav-btn {
      background: #2d4a6e;
      border: none;
      color: white;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      width: auto;
      margin: 0;
      line-height: 1.4;
    }
    .nav-btn:hover:not(:disabled) { background: #3a5f8a; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    .kw-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1;
    }

    .kw-tag {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      color: #111;
      white-space: nowrap;
      border: 1px solid rgba(0,0,0,0.15);
    }

    /* ── Pages ── */
    #viewerContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px 60px;
      gap: 20px;
    }

    .page-wrapper {
      position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.55);
      flex-shrink: 0;
    }

    .page-canvas {
      display: block;
    }

    /* Highlight overlay sits exactly on top of the rendered canvas */
    .highlight-layer {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    #loadingMsg {
      color: #ccc;
      font-size: 14px;
      text-align: center;
      padding: 60px 20px;
    }

    .error-box {
      background: white;
      color: #c0392b;
      padding: 24px 28px;
      border-radius: 6px;
      max-width: 580px;
      line-height: 1.7;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <h1>VMSDEP PDF Viewer</h1>
    <div class="match-nav">
      <button class="nav-btn" id="prevMatch" disabled>&#9650; Prev</button>
      <span id="matchInfo">Loading…</span>
      <button class="nav-btn" id="nextMatch" disabled>Next &#9660;</button>
    </div>
    <div class="kw-legend">
      <span class="kw-tag" style="background:#90EE90;">Total &amp; Permanent</span>
      <span class="kw-tag" style="background:#DDA0DD;">Permanently &amp; Total</span>
      <span class="kw-tag" style="background:#FFB6C1;">Permanent</span>
      <span class="kw-tag" style="background:#87CEEB;">Totally &amp; Permanently</span>
      <span class="kw-tag" style="background:#ffff80;">Static</span>
      <span class="kw-tag" style="background:#FFD700;">Examination</span>
      <span class="kw-tag" style="background:#F0E68C;">Exams</span>
      <span class="kw-tag" style="background:#98FB98;">No Future Exams</span>
    </div>
  </div>

  <div id="viewerContainer">
    <div id="loadingMsg">Loading PDF…</div>
  </div>

  <script src="pdf.min.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
